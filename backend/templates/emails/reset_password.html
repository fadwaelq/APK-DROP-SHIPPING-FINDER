<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Réinitialisation</title>
</head>

<body style="margin:0; padding:0; background:#f4f6f8; font-family:Arial, sans-serif;">

    <div style="display:flex; justify-content:center; padding:40px 0;">
        
        <div style="background:#ffffff; border-radius:12px; padding:30px; width:500px; box-shadow:0 4px 10px rgba(0,0,0,0.05);">

            <h2 style="margin:0; color:#333; text-align:center;">
                🔑 Réinitialisation
            </h2>

            <p style="padding-top:20px; color:#555;">
                Bonjour <strong>{{ username }}</strong>,
            </p>

            <p style="color:#555;">
                Vous avez demandé à réinitialiser votre mot de passe.
            </p>

            <div style="text-align:center; padding:30px 0;">
                <span style="font-size:30px; font-weight:bold; letter-spacing:4px; color:#FF5722;">
                    {{ otp }}
                </span>
            </div>

            <p style="color:#777; font-size:14px;">
                Utilisez ce code pour définir un nouveau mot de passe.
            </p>

            <p style="padding-top:30px; font-size:12px; color:#aaa; text-align:center;">
                Si vous n'avez rien demandé, ignorez cet email.
            </p>

        </div>

    </div>

</body>
</html>
