sonar.projectKey=apk-dropshipping-finder
sonar.projectName=apk-dropshipping-finder
sonar.host.url=http://localhost:9000
sonar.sourceEncoding=UTF-8

# Analyse backend Python
sonar.sources=.
sonar.exclusions=**/venv/**,**/__pycache__/**,**/*.pyc,**/migrations/**,**/node_modules/**,**/build/**,**/.dart_tool/**,check_sonar_status.py,list_sonar_issues.py,pytest.ini

# Python
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml