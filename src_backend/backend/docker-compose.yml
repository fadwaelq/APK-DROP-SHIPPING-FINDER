version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: apk-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-dropshipping_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - apk-network
    restart: unless-stopped

  # Django Backend
  backend:
    build: .
    container_name: apk-backend
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    environment:
      DEBUG: "True"
      SECRET_KEY: "django-insecure-change-this-in-production"
      DATABASE_URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@db:5432/${DB_NAME:-dropshipping_db}"
      DB_HOST: "db"
      DB_PORT: "5432"
      REDIS_URL: "redis://redis:6379/0"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - apk-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: apk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - apk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  apk-network:
    driver: bridge
